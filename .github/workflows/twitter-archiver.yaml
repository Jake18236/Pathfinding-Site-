name: Archive Tweet

on:
  schedule:
    - cron: "0 */8 * * *"      # every 8 hours (midnight, 8am, 4pm UTC)
  workflow_dispatch: {}        # allow manual runs

concurrency:
  group: tweet-archiver
  cancel-in-progress: true     # never let two archiver runs overlap

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write          # needed to commit MD/media

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install archiver deps
        run: |
          python -m pip install --upgrade pip
          pip install twarc requests python-slugify

      - name: Verify secrets are set
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: |
          echo "Checking required secrets..."
          if [ -z "$TWITTER_BEARER_TOKEN" ]; then
            echo "::error::TWITTER_BEARER_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$SHEETS_WEBHOOK_URL" ]; then
            echo "::warning::SHEETS_WEBHOOK_URL secret is not set - archiver will skip"
          fi
          echo "Secrets verified."

      - name: Process tweet queue
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          echo "Starting tweet queue processor..."
          python scripts/process_bookmarks.py
          echo "Tweet queue processing complete."

      - name: Commit archived content
        run: |
          git config user.name "github-actions"
          git config user.email "noreply@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "[skip ci] tweet-archiver: archived new items"
            git push
            echo "Committed and pushed new archived content."
          fi

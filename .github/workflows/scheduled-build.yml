name: Auto-Scheduled Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes (UTC)
  workflow_dispatch: {}

concurrency:
  group: build-and-publish
  cancel-in-progress: true

jobs:
  build_and_publish:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main (source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML python-dateutil requests

      - name: Checkout gh-pages (publish)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish
          fetch-depth: 0

      - name: Prime cover cache
        run: |
          if [ -d publish/docs/static/img/book_cover_thumbnails ]; then
            mkdir -p source/static/img/book_cover_thumbnails
            rsync -a publish/docs/static/img/book_cover_thumbnails/ source/static/img/book_cover_thumbnails/
          fi

      - name: Fetch external data
        working-directory: source
        env:
          COURSE_RESOURCES_CSV_URL: https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0MhdIkphQZpu5C2sQ_1WhGdE8DLxxlVtRirER3_wLgUsli0wvjdq-rYQeStwf9ubSVeDaKDNUbYeh/pub?gid=518321558&single=true&output=csv
        run: |
          mkdir -p static/csv static/img/book_cover_thumbnails static/json
          curl -L -s "$COURSE_RESOURCES_CSV_URL" -o static/csv/resources.csv
          python3 scripts/fetch_book_covers.py \
            --resources static/csv/resources.csv \
            --dest static/img/book_cover_thumbnails \
            --size L \
            --pause 0.05
          python3 scripts/fetch_course_changelog.py \
            --config static/yaml/course_changelog.yaml \
            --out static/json/course_changelog.json \
            --limit 5

      - name: Install npm dependencies
        working-directory: source
        run: npm ci

      - name: Build site with Eleventy
        working-directory: source
        run: npm run build

      - name: Sync built docs to gh-pages/docs
        run: |
          # Preserve existing CNAME from gh-pages if present
          mkdir -p publish/docs
          if [ -f publish/docs/CNAME ]; then cp publish/docs/CNAME /tmp/CNAME; fi
          if [ -f publish/CNAME ]; then cp publish/CNAME /tmp/CNAME; fi
          # Use CNAME from source if provided
          if [ -f source/CNAME ]; then cp source/CNAME /tmp/CNAME; fi
          if [ -f source/docs/CNAME ]; then cp source/docs/CNAME /tmp/CNAME; fi

          rsync -a --delete source/docs/ publish/docs/

          # Restore CNAME into both locations to satisfy GitHub Pages
          if [ -f /tmp/CNAME ]; then cp /tmp/CNAME publish/docs/CNAME; cp /tmp/CNAME publish/CNAME; fi

      - name: Commit and push to gh-pages
        working-directory: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if ! git diff --cached --quiet; then
            git commit -m "Automated build: refresh resources from CSV"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

name: Auto-Scheduled Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes (UTC)
  workflow_dispatch: {}

concurrency:
  group: build-and-publish
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (source)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML python-dateutil requests

      - name: Restore book cover cache
        uses: actions/cache@v4
        with:
          path: static/img/book_cover_thumbnails
          key: book-covers-v1
          restore-keys: |
            book-covers-

      - name: Restore YouTube thumbnail cache
        uses: actions/cache@v4
        with:
          path: static/img/youtube_thumbnails
          key: youtube-thumbnails-v1
          restore-keys: |
            youtube-thumbnails-

      - name: Fetch external data
        env:
          COURSE_RESOURCES_CSV_URL: https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0MhdIkphQZpu5C2sQ_1WhGdE8DLxxlVtRirER3_wLgUsli0wvjdq-rYQeStwf9ubSVeDaKDNUbYeh/pub?gid=518321558&single=true&output=csv
        run: |
          mkdir -p static/csv static/img/book_cover_thumbnails static/img/youtube_thumbnails static/json
          curl -L -s "$COURSE_RESOURCES_CSV_URL" -o static/csv/resources.csv
          python3 scripts/fetch_book_covers.py \
            --resources static/csv/resources.csv \
            --dest static/img/book_cover_thumbnails \
            --size L \
            --pause 0.05
          python3 scripts/fetch_youtube_thumbnails.py \
            --resources static/csv/resources.csv \
            --dest static/img/youtube_thumbnails \
            --pause 0.05
          python3 scripts/fetch_course_changelog.py \
            --config static/yaml/course_changelog.yaml \
            --out static/json/course_changelog.json \
            --limit 5

      - name: Install npm dependencies
        run: npm ci

      - name: Build site with Eleventy
        run: npm run build

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

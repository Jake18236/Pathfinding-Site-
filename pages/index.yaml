title:      Teaching and Learning Artificial Intelligence
icon:       fa-rocket
navigation:
    - name: "Courses"
      link: "#courses"
      icon: "fa-chalkboard-user"
    - name: "Learning"
      link: "#learning"
      icon: "fa-brain"
    - name: "Library"
      link: "#library"
      icon: "fa-book"
internal:
external:
    resources:  'csv:static/csv/resources.csv'
    course_changelog: 'json:static/json/course_changelog.json'
body:       |

    {% set resources_map = page.external.get('resources', {}) or {} %}
    {% set course_logs = page.external.get('course_changelog', {}) or {} %}

    <div class="row" style="margin-bottom: 30px;">
        <div class="col-md-7 col-sm-12">
            <div markdown="1">

            I am an assistant teaching professor at the University of Notre Dame.
            I mostly teach courses on artificial intelligence. This landing
            page is intended to serve both as a collection of my courses, and a
            list of materials that I myself am learning from. In addition to this
            ever lengthening list, I also maintain a modest library of books related
            to the topic, and encourage students to browse the library and come 
            borrow books from me if they're interested.

            </div>
        </div>
        <div class="col-md-5 col-sm-12">
            <img src="static/img/teaser.png" alt="Neural network illustration" style="width: 100%; max-width: 380px; display: block; margin: 0 auto;" />
        </div>
    </div>

    <div class="row">
        <div class="page-header">
            <h2 id="courses"><i class="fa-solid fa-chalkboard-user"></i> Courses</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 col-sm-12" style="margin-bottom: 30px;">
            <h3 style="margin-top: 0; margin-bottom: 12px; font-weight: 600; text-align: center;">
                <a href="https://10124.williamtheisen.com" class="course-title-link" target="_blank" rel="noopener">CSE 10124 &middot; Introduction to Using Generative AI</a>
            </h3>
            <div class="embed-responsive embed-responsive-16by9 course-embed">
                <iframe
                    src="https://10124.williamtheisen.com"
                    title="Introductory AI Course Site"
                    loading="lazy"
                    class="embed-responsive-item"
                    allowfullscreen
                    tabindex="-1"
                    aria-hidden="true">
                </iframe>
                <a class="course-embed__overlay" href="https://10124.williamtheisen.com" target="_blank" rel="noopener" aria-label="Open the full CSE 10124 course website"></a>
            </div>
            {% set cse10124_log = (course_logs.get('cse10124', {}).get('entries') or []) %}
            {% set cse10124_error = course_logs.get('cse10124', {}).get('error') %}
            <div style="color: #9a9a9a; font-size: 0.8em; margin-top: 10px;">
                <strong>Changelog</strong>
                <ul style="margin: 6px 0 0 18px;">
                {% if cse10124_log %}
                    {% for entry in cse10124_log[:4] %}
                        <li>
                            {% if entry.get('url') %}
                                <a href="{{ entry['url'] }}">{{ entry.get('message') or 'Update' }}</a>
                            {% else %}
                                {{ entry.get('message') or 'Update' }}
                            {% end %}
                            {% if entry.get('date_display') %}
                                <span class="text-muted" style="margin-left: 6px;">{{ entry['date_display'] }}</span>
                            {% end %}
                        </li>
                    {% end %}
                {% elif cse10124_error %}
                    <li class="text-muted">Could not fetch updates ({{ cse10124_error }}).</li>
                {% else %}
                    <li class="text-muted">No recent updates.</li>
                {% end %}
                </ul>
            </div>
        </div>
        <div class="col-md-6 col-sm-12" style="margin-bottom: 30px;">
            <h3 style="margin-top: 0; margin-bottom: 12px; font-weight: 600; text-align: center;">
                <a href="https://30124.williamtheisen.com" class="course-title-link" target="_blank" rel="noopener">CSE 30124 &middot; Introduction to Artificial Intelligence</a>
            </h3>
            <div class="embed-responsive embed-responsive-16by9 course-embed">
                <iframe
                    src="https://30124.williamtheisen.com"
                    title="Advanced AI Course Site"
                    loading="lazy"
                    class="embed-responsive-item"
                    allowfullscreen
                    tabindex="-1"
                    aria-hidden="true">
                </iframe>
                <a class="course-embed__overlay" href="https://30124.williamtheisen.com" target="_blank" rel="noopener" aria-label="Open the full CSE 30124 course website"></a>
            </div>
            {% set cse30124_log = (course_logs.get('cse30124', {}).get('entries') or []) %}
            {% set cse30124_error = course_logs.get('cse30124', {}).get('error') %}
            <div style="color: #9a9a9a; font-size: 0.8em; margin-top: 10px;">
                <strong>Changelog</strong>
                <ul style="margin: 6px 0 0 18px;">
                {% if cse30124_log %}
                    {% for entry in cse30124_log[:4] %}
                        <li>
                            {% if entry.get('url') %}
                                <a href="{{ entry['url'] }}">{{ entry.get('message') or 'Update' }}</a>
                            {% else %}
                                {{ entry.get('message') or 'Update' }}
                            {% end %}
                            {% if entry.get('date_display') %}
                                <span class="text-muted" style="margin-left: 6px;">{{ entry['date_display'] }}</span>
                            {% end %}
                        </li>
                    {% end %}
                {% elif cse30124_error %}
                    <li class="text-muted">Could not fetch updates ({{ cse30124_error }}).</li>
                {% else %}
                    <li class="text-muted">No recent updates.</li>
                {% end %}
                </ul>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="page-header">
            <h2 id="learning"><i class="fa-solid fa-brain"></i> Learning</h2>
        </div>
    </div>
    <div markdown="0">
    {% set learning_entries = [] %}
    {% for rid, entries in resources_map.items() %}
        {% if 'learning' in rid %}
            {% for entry in entries %}
                {% set _ = learning_entries.append(entry) %}
            {% end %}
        {% end %}
    {% end %}
    {% if learning_entries %}
        {% set type_icons = {
            'book': 'fa-solid fa-book',
            'video': 'fa-solid fa-video-camera',
            'notebook': 'fa-brands fa-python',
            'slides': 'fa-solid fa-person-chalkboard',
            'podcast': 'fa-solid fa-podcast',
            'blogpost': 'fa-solid fa-share-alt',
            'tweet': 'fa-brands fa-square-x-twitter',
            'paper': 'fa-solid fa-file-pdf',
            'essay': 'fa-solid fa-file-pdf'
        } %}
        {% set sorted_learning = sort_by_key(learning_entries, 'date_added_sort_key', True) %}
        {% set current_year = datetime.datetime.now().year %}
        {% if len(sorted_learning) > 5 %}
            {% set grouped_learning = {} %}
            {% for item in sorted_learning %}
                {% set year_key = item.get('date_added_year') or 'Other' %}
                {% set _ = grouped_learning.setdefault(year_key, []).append(item) %}
            {% end %}
            {% set numeric_years = [y for y in grouped_learning.keys() if y != 'Other'] %}
            {% set ordered_numeric_years = sorted(numeric_years, reverse=True) %}
            {% set ordered_years = ordered_numeric_years + (['Other'] if 'Other' in grouped_learning else []) %}
            <div class="row" style="margin-top: 15px;">
                <div class="col-sm-12">
                    <div class="panel-group" id="learning-archive" role="tablist">
                    {% for year in ordered_years %}
                        {% set year_slug = 'learning-year-' + slugify('%s' % year) %}
                        {% set year_entries = grouped_learning.get(year, []) %}
                        {% set preview_list = year_entries[:5] %}
                        {% set remaining_list = year_entries[5:] %}
                        {% set collapse_class = 'in' if year == current_year else '' %}
                        <div class="panel panel-default" style="border-radius: 4px; overflow: hidden; margin-bottom: 10px;">
                            <div class="panel-heading" role="tab" id="{{ year_slug }}-heading" style="padding: 0;">
                                <button class="btn btn-link btn-block" type="button" data-toggle="collapse" data-target="#{{ year_slug }}" aria-expanded="false" aria-controls="{{ year_slug }}" style="text-align: left; padding: 12px 15px;">
                                    {{ year }}
                                    <i class="fa fa-caret-down pull-right"></i>
                                </button>
                            </div>
                            <div id="{{ year_slug }}" class="panel-collapse collapse {{ collapse_class }}" role="tabpanel" aria-labelledby="{{ year_slug }}-heading">
                                <ul class="list-group" style="margin-bottom: 0;">
                                {% for item in preview_list %}
                                    {% set display_name = (item.get('name', '') or '').strip() %}
                                    {% set type_key = (item.get('type', '') or '').lower() %}
                                    {% set icon_class = type_icons.get(type_key, 'fa-solid fa-paperclip') %}
                                    <li class="list-group-item" style="display: flex; align-items: center; justify-content: space-between;">
                                        <div style="display: flex; align-items: center;">
                                            <i class="{{ icon_class }}" style="margin-right: 10px; color: #4e73df;"></i>
                                            <div>
                                                {% if item.get('link') %}
                                                    <a href="{{ item['link'] }}">{{ display_name }}</a>
                                                {% else %}
                                                    {{ display_name }}
                                                {% end %}
                                                {% if item.get('author') or item.get('student') %}
                                                    <div class="text-muted" style="font-size: 0.85em;">
                                                        {% if item.get('author') %}
                                                            {{ (item['author'] or '').strip() }}
                                                        {% else %}
                                                            {{ (item['student'] or '').strip() }}
                                                        {% end %}
                                                    </div>
                                                {% end %}
                                            </div>
                                        </div>
                                        <div class="text-muted" style="font-size: 0.85em;">
                                            {% if item.get('date_added_display') %}
                                                {{ item['date_added_display'] }}
                                            {% end %}
                                        </div>
                                    </li>
                                {% end %}
                                {% if not preview_list %}
                                    <li class="list-group-item text-muted">No learning resources recorded for {{ year }}.</li>
                                {% end %}
                                </ul>
                                {% if remaining_list %}
                                    <div style="display: flex; justify-content: center; margin-top: 10px;">
                                        <button class="btn btn-link btn-sm" type="button" data-toggle="collapse" data-target="#{{ year_slug }}-full" aria-expanded="false" aria-controls="{{ year_slug }}-full">
                                            Show all {{ year }} learning resources
                                            <i class="fa fa-caret-down"></i>
                                        </button>
                                    </div>
                                    <div class="collapse" id="{{ year_slug }}-full" style="margin-top: 10px;">
                                        <ul class="list-group" style="margin-bottom: 0;">
                                        {% for item in remaining_list %}
                                            {% set display_name = (item.get('name', '') or '').strip() %}
                                            {% set type_key = (item.get('type', '') or '').lower() %}
                                            {% set icon_class = type_icons.get(type_key, 'fa-solid fa-paperclip') %}
                                            <li class="list-group-item" style="display: flex; align-items: center; justify-content: space-between;">
                                                <div style="display: flex; align-items: center;">
                                                    <i class="{{ icon_class }}" style="margin-right: 10px; color: #4e73df;"></i>
                                                    <div>
                                                        {% if item.get('link') %}
                                                            <a href="{{ item['link'] }}">{{ display_name }}</a>
                                                        {% else %}
                                                            {{ display_name }}
                                                        {% end %}
                                                        {% if item.get('author') or item.get('student') %}
                                                            <div class="text-muted" style="font-size: 0.85em;">
                                                                {% if item.get('author') %}
                                                                    {{ (item['author'] or '').strip() }}
                                                                {% else %}
                                                                    {{ (item['student'] or '').strip() }}
                                                                {% end %}
                                                            </div>
                                                        {% end %}
                                                    </div>
                                                </div>
                                                <div class="text-muted" style="font-size: 0.85em;">
                                                    {% if item.get('date_added_display') %}
                                                        {{ item['date_added_display'] }}
                                                    {% end %}
                                                </div>
                                            </li>
                                        {% end %}
                                        </ul>
                                    </div>
                                {% end %}
                            </div>
                        </div>
                    {% end %}
                    </div>
                </div>
            </div>
        {% end %}
    {% else %}
        <div class="row">
            <div class="col-sm-12">
                <p class="text-muted">Learning resources will appear here once they are added to <code>static/csv/resources.csv</code> with an <code>export_id</code> containing “learning”.</p>
            </div>
        </div>
    {% end %}
    </div>

    <div class="row">
        <div class="page-header">
            <h2 id="library"><i class="fa-solid fa-book"></i> Library</h2>
        </div>
    </div>
    <div markdown="0">
    {% set library_entries = [] %}
    {% for rid, entries in resources_map.items() %}
        {% if rid.startswith('lib-') or 'library' in rid %}
            {% for entry in entries %}
                {% set _ = library_entries.append(entry) %}
            {% end %}
        {% end %}
    {% end %}
    {% if library_entries %}
        {% set library_sorted = sort_by_key(library_entries, 'date_added_sort_key', True) %}
        <div class="row">
            <div class="col-sm-12">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="library-search" class="sr-only">Search library</label>
                    <div class="input-group">
                        <span class="input-group-addon"><i class="fa fa-search"></i></span>
                        <input type="text" id="library-search" class="form-control" placeholder="Search library by title, author, type, or notes&hellip;">
                    </div>
                </div>
            </div>
        </div>
        <div id="library-card-container">
        {% for item in library_sorted %}
            {% set display_title = (item.get('name', '') or '').strip() %}
            {% if not display_title %}
                {% set display_title = (item.get('id', '') or '').strip() %}
            {% end %}
            {% set display_author = (item.get('author', '') or '').strip() %}
            {% set raw_type = (item.get('type', '') or '').strip() %}
            {% set display_type = raw_type.replace('_', ' ').title() if raw_type else '' %}
            {% set checked_out = bool(item.get('checked_out')) %}
            {% set status_class = 'label-warning' if checked_out else 'label-success' %}
            {% set status_text = 'Checked out' if checked_out else 'Available' %}
            {% set date_added = item.get('date_added_display') or item.get('date_added_raw') or '' %}
            {% set tooltip_text = '' %}
            {% if checked_out and (item.get('student') or '').strip() %}
                {% set tooltip_text = 'Checked out by ' + (item.get('student') or '').strip() %}
            {% elif checked_out %}
                {% set tooltip_text = 'Checked out' %}
            {% end %}
            {% set cover_image = item.get('cover') or item.get('image') or '' %}
            {% set notes = (item.get('notes') or '').strip() %}
            {% set search_blob = (display_title + ' ' + display_author + ' ' + display_type + ' ' + notes).lower() %}
            <div class="library-card-wrapper" data-haystack="{{ search_blob }}">
                <div class="panel panel-default library-card">
                    <div class="library-card-cover">
                        {% if cover_image %}
                            <img src="{{ cover_image }}" alt="Cover for {{ display_title }}">
                        {% else %}
                            <i class="fa fa-book" style="font-size: 3em; color: #bbb;"></i>
                        {% end %}
                    </div>
                    <div class="panel-body library-card-body">
                        <h4 class="library-card-title">
                            {% if item.get('link') %}
                                <a href="{{ item['link'] }}">{{ display_title }}</a>
                            {% else %}
                                {{ display_title }}
                            {% end %}
                        </h4>
                        <div class="library-card-meta">
                            <div><i class="fa fa-user" style="margin-right: 6px;"></i>{{ display_author if display_author else 'Author unavailable' }}</div>
                            <div><i class="fa fa-tag" style="margin-right: 6px;"></i>{{ display_type if display_type else 'Type unavailable' }}</div>
                        </div>
                        {% if notes %}
                            <p class="text-muted" style="font-size: 0.85em;">{{ notes }}</p>
                        {% end %}
                        {% if item.get('rating') %}
                            <span class="label label-info" style="margin-top: auto; align-self: flex-start;">Rated {{ item['rating'] }}</span>
                        {% end %}
                    </div>
                    <div class="panel-footer library-card-footer">
                        <span class="label {{ status_class }}"
                              data-toggle="tooltip"
                              data-placement="top"
                              title="{{ tooltip_text if tooltip_text else status_text }}"
                        >{{ status_text }}</span>
                        <span class="library-card-date" style="color: #777;">
                            <i class="fa fa-clock-o" style="margin-right: 6px;"></i>{{ date_added if date_added else 'Date not recorded' }}
                        </span>
                    </div>
                </div>
            </div>
        {% end %}
        </div>
    {% else %}
        <div class="row">
            <div class="col-sm-12">
                <p class="text-muted">Library inventory is maintained in <code>static/csv/resources.csv</code>; tag entries with an <code>export_id</code> beginning with <code>lib-</code> or containing “library” to surface them here.</p>
            </div>
        </div>
    {% end %}
    </div>

    <script>
        function toggleResources(id, unit) {
            const button = document.getElementById(id);
            const resourcesRow = document.getElementById(`resources-${id}`);
            const unitCell = document.getElementById(`unit-cell-${unit}`);

            if (resourcesRow.style.display === 'table-row') {
                button.classList.remove('fa-caret-down');
                button.classList.add('fa-caret-right');

                if (unitCell) { unitCell.rowSpan = unitCell.rowSpan - 1; }
                resourcesRow.style.display = 'none';
            } else {
                button.classList.remove('fa-caret-right');
                button.classList.add('fa-caret-down');

                if (unitCell) { unitCell.rowSpan = unitCell.rowSpan + 1; }
                resourcesRow.style.display = 'table-row';
            }
        }

        function fixAlternatingRows() {
            let topicRows = document.querySelectorAll(".topic-row");
            topicRows.forEach((row, index) => {
                if (index % 2 === 0) {
                    row.style.backgroundColor = "#f9f9f9";
                } else {
                    row.style.backgroundColor = "#ffffff";
                }
            });
        }

        document.querySelectorAll(".caret-icon").forEach(icon => {
            icon.addEventListener("click", function() {
                setTimeout(fixAlternatingRows, 200);
            });
        });

        document.addEventListener("DOMContentLoaded", fixAlternatingRows);

        function toggleResourceSection(id) {
            const resourcesDiv = document.getElementById(id);
            const icon = document.getElementById(`${id}-icon`);

            if (resourcesDiv.style.display === 'none' || resourcesDiv.style.display === '') {
                resourcesDiv.style.display = 'block';
                icon.classList.remove('fa-caret-right');
                icon.classList.add('fa-caret-down');
            } else {
                resourcesDiv.style.display = 'none';
                icon.classList.remove('fa-caret-down');
                icon.classList.add('fa-caret-right');
            }
        }

        window.addEventListener("load", function() {
            if (window.jQuery && typeof window.jQuery.fn.tooltip === 'function') {
                window.jQuery('[data-toggle="tooltip"]').tooltip();
                const $libraryContainer = window.jQuery('#library-card-container');
                const $libraryCards = window.jQuery('.library-card-wrapper');
                window.jQuery('#library-search').on('input', function() {
                    const term = window.jQuery(this).val().toLowerCase().trim();
                    $libraryCards.each(function() {
                        const $card = window.jQuery(this);
                        const haystack = ($card.data('haystack') || '').toString();
                        const fallback = $card.text().toLowerCase();
                        const matches = term === '' || haystack.indexOf(term) !== -1 || fallback.indexOf(term) !== -1;
                        $card.toggle(matches);
                    });
                });
            }
        });
    </script>

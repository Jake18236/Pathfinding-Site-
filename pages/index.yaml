    <div class="row" markdown="1">

    I am an assistant teaching professor at the University of Notre Dame.
    I teach primarily courses on artificial intelligence. This landing
    page is intended to both serve as a collection of my courses, and a
    list materials that I myself am learning from. In addition to this
    ever lengthening list, I also maintain a modest library books related
    to the topic, and encourage students to browse the library and come 
    borrow books from me if they're interested.

